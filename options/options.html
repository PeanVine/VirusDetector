<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virus Detector 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div id="app">
    <!-- ====== SIDEBAR ====== -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <svg viewBox="0 0 24 24" width="28" height="28" class="sidebar-logo">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="none" stroke="#4CAF50" stroke-width="2"/>
          <path d="M9 11l2 2 4-4" stroke="#4CAF50" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="sidebar-title-group">
          <span class="sidebar-title">Virus Detector</span>
          <span class="sidebar-subtitle">设置</span>
        </div>
      </div>

      <nav id="sidebar-nav">
        <!-- JS 动态填充 -->
      </nav>

      <div class="sidebar-footer">
        <button id="mode-toggle" class="mode-toggle-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
          </svg>
          <span id="mode-toggle-text">高级模式</span>
        </button>
      </div>
    </aside>

    <!-- ====== MAIN CONTENT ====== -->
    <main id="content">
      <!-- Unsaved changes banner -->
      <div id="unsaved-banner" style="display:none;">
        <div class="banner-icon">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <span class="banner-text">有未保存的更改</span>
        <div class="banner-actions">
          <button id="save-btn" class="btn btn-primary">保存更改</button>
          <button id="discard-btn" class="btn">撤销</button>
        </div>
      </div>

      <!-- Section container (JS populated) -->
      <div id="section-container"></div>

      <!-- Actions bar -->
      <div id="actions-bar">
        <button id="import-btn" class="btn" title="从 JSON 文件导入设置">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          导入设置
        </button>
        <button id="export-btn" class="btn" title="导出设置到 JSON 文件">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          导出设置
        </button>
        <button id="reset-btn" class="btn btn-danger" title="恢复所有设置为默认值">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.5 9a9 9 0 1113.2 2.8L20 15"/></svg>
          恢复默认
        </button>
        <input type="file" id="import-file" accept=".json" style="display:none">
      </div>
    </main>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Confirmation modal (hidden by default) -->
    <div id="confirm-modal" class="modal-overlay" style="display:none;">
      <div class="modal-box">
        <div class="modal-icon">
          <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#FF9800" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <p class="modal-message" id="modal-message"></p>
        <div class="modal-actions">
          <button id="modal-cancel-btn" class="btn">取消</button>
          <button id="modal-confirm-btn" class="btn btn-danger">确认</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
